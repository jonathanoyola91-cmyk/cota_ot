<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Órdenes de Trabajo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Estilos básicos -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #34495e;
            color: #ffffff;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .empty {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Historial de Órdenes de Trabajo</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Equipo</th>
                <th>Fecha</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% if workorders %}
                {% for wo in workorders %}
                    <tr>
                        <td>{{ wo.id }}</td>
                        <td>{{ wo.cliente }}</td>
                        <td>{{ wo.equipo }}</td>
                        <td>{{ wo.fecha }}</td>
                        <td>{{ wo.estado }}</td>
                    </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="5" class="empty">
                        No hay órdenes de trabajo registradas
                    </td>
                </tr>
            {% endif %}
        </tbody>
    </table>

</body>
</html>
