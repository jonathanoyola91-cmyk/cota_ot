<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Impetus Control{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6f9;
            color: #1f2933;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #102a43;
            color: white;
            padding: 24px 18px;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #f6c343;
        }

        .menu a {
            display: block;
            color: #d9e2ec;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .menu a:hover,
        .menu a.active {
            background: #1f4e79;
            color: #ffffff;
        }

        .main {
            flex: 1;
            padding: 28px;
        }

        .topbar {
            background: white;
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h1 {
            margin: 0;
            font-size: 22px;
        }

        .user-box {
            font-size: 14px;
            color: #52606d;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        .card small {
            color: #66788a;
        }

        .card strong {
            display: block;
            font-size: 26px;
            margin-top: 8px;
            color: #102a43;
        }

        .panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f0f4f8;
            color: #334e68;
            text-align: left;
            font-size: 12px;
            padding: 12px;
            text-transform: uppercase;
        }

        td {
            padding: 13px 12px;
            border-bottom: 1px solid #e4e7eb;
            font-size: 14px;
        }

        .btn {
            background: #1f4e79;
            color: white !important;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: inline-block;
        }

        .btn-secondary {
            background: #627d98;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            background: #e0f2fe;
            color: #075985;
        }

        .form-control {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
        }

        textarea.form-control {
            resize: vertical;
            min-width: 180px;
        }

        button.btn {
            border: none;
            cursor: pointer;
        }

        .alert {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #86efac;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 18px;
    font-size: 14px;
        }

        .alert-error {
    background: #fee2e2;
    color: #991b1b;
    border-color: #fecaca;
        }
       
        
        .toast-wrap {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 9999;
        }

        .toast {
    min-width: 260px;
    max-width: 340px;
    padding: 12px 16px;
    margin-bottom: 10px;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
    animation: fadeIn .25s ease;
        }

        .toast-success,
        .toast-info {
            background: #16a34a;
        }

        .toast-warning {
            background: #d97706;
        }

        .toast-error {
            background: #dc2626;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
      
        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: auto;
            }

            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<script>
setTimeout(function () {
    document.querySelectorAll('.toast').forEach(function(el){
        el.style.transition = "all .4s ease";
        el.style.opacity = "0";
        el.style.transform = "translateY(-10px)";
        setTimeout(() => el.remove(), 400);
    });
}, 3000);
</script>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="brand">IMPETUS CONTROL</div>

        <nav class="menu">
            <a href="/compras_oil/" class="active">Compras OIL</a>
            <a href="/inventario/">Inventario</a>
            <a href="/admin/">Admin Django</a>
            <a href="/quotes/">Cotizaciones</a>
            <a href="/historial/">Historial</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="user-box">
                Usuario: {{ request.user.username }}
            </div>
        </div>

        <div class="toast-wrap">
            {% if messages %}
                {% for message in messages %}
                    <div class="toast toast-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}  
        </div>
       
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>
